name: CI — Clarity Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clarity-check:
    name: Clarity Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Clarinet
        run: |
          curl -L https://github.com/hirosystems/clarinet/releases/download/v2.9.0/clarinet-linux-x64-glibc.tar.gz | tar -xz
          chmod +x clarinet
          sudo mv clarinet /usr/local/bin/
      - run: clarinet check
        continue-on-error: true

  js-build:
    name: JS/TS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - run: npm install --if-present
        continue-on-error: true
      - run: npm run build --if-present
        continue-on-error: true
      - run: npm test --if-present
        continue-on-error: true
